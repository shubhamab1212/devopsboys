name: Multi-Environment Deploy

on:
  push:
    branches: [main]

jobs:
  deploy-dev:
    runs-on: ubuntu-latest
    environment: development
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to Dev
        run: echo "Deploying to dev — replace with your deploy command"
        env:
          KUBECONFIG_DATA: ${{ secrets.DEV_KUBECONFIG }}

  deploy-staging:
    needs: deploy-dev
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to Staging
        run: echo "Deploying to staging — replace with your deploy command"
        env:
          KUBECONFIG_DATA: ${{ secrets.STAGING_KUBECONFIG }}

  deploy-prod:
    needs: deploy-staging
    runs-on: ubuntu-latest
    environment: production   # Requires manual approval in GitHub settings
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to Production
        run: echo "Deploying to production — replace with your deploy command"
        env:
          KUBECONFIG_DATA: ${{ secrets.PROD_KUBECONFIG }}
