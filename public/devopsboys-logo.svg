<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="200" height="200">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d0d12"/>
      <stop offset="100%" style="stop-color:#111118"/>
    </linearGradient>

    <!-- Terminal gradient -->
    <linearGradient id="termGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="50%" style="stop-color:#4f46e5"/>
      <stop offset="100%" style="stop-color:#2563eb"/>
    </linearGradient>

    <!-- Glow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Subtle outer glow -->
    <filter id="outerGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="16" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Text glow -->
    <filter id="textGlow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background square with rounded corners -->
  <rect width="500" height="500" rx="60" ry="60" fill="url(#bgGrad)"/>

  <!-- Subtle dot grid pattern -->
  <pattern id="dots" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
    <circle cx="1" cy="1" r="1" fill="rgba(255,255,255,0.04)"/>
  </pattern>
  <rect width="500" height="500" rx="60" ry="60" fill="url(#dots)"/>

  <!-- Glow blob behind terminal -->
  <ellipse cx="250" cy="210" rx="130" ry="110" fill="#4f46e5" opacity="0.12" filter="url(#outerGlow)"/>

  <!-- Terminal window card -->
  <rect x="105" y="110" width="290" height="210" rx="18" ry="18" fill="url(#termGrad)" filter="url(#glow)"/>

  <!-- Terminal inner dark area -->
  <rect x="105" y="148" width="290" height="172" rx="0" ry="0" fill="rgba(0,0,0,0.45)"/>
  <rect x="105" y="148" width="290" height="172" rx="0" ry="0" fill="rgba(0,0,0,0)"
        style="border-bottom-left-radius:18px; border-bottom-right-radius:18px;"/>
  <path d="M105 148 L395 148 L395 302 Q395 318 379 318 L121 318 Q105 318 105 302 Z" fill="rgba(0,0,0,0.5)"/>

  <!-- macOS dots -->
  <circle cx="134" cy="130" r="9" fill="#f87171"/>
  <circle cx="163" cy="130" r="9" fill="#fbbf24"/>
  <circle cx="192" cy="130" r="9" fill="#34d399"/>

  <!-- Prompt symbol > -->
  <text x="128" y="198" font-family="'Courier New', monospace" font-size="32" font-weight="900" fill="#a78bfa" filter="url(#textGlow)">›</text>

  <!-- Cursor _ -->
  <text x="152" y="196" font-family="'Courier New', monospace" font-size="26" font-weight="700" fill="white">_</text>

  <!-- Fake code line 1 -->
  <rect x="128" y="215" width="120" height="6" rx="3" fill="rgba(196,181,253,0.45)"/>

  <!-- Fake code line 2 -->
  <rect x="128" y="232" width="80" height="6" rx="3" fill="rgba(255,255,255,0.2)"/>

  <!-- Fake code line 3 -->
  <rect x="128" y="249" width="150" height="6" rx="3" fill="rgba(196,181,253,0.25)"/>

  <!-- Fake code line 4 -->
  <rect x="128" y="266" width="95" height="6" rx="3" fill="rgba(255,255,255,0.15)"/>

  <!-- DevOpsBoys text -->
  <text
    x="250"
    y="378"
    font-family="'Arial', 'Helvetica', sans-serif"
    font-size="46"
    font-weight="800"
    fill="white"
    text-anchor="middle"
    letter-spacing="-1"
  >DevOps<tspan fill="#a78bfa">Boys</tspan></text>

  <!-- Tagline -->
  <text
    x="250"
    y="415"
    font-family="'Arial', 'Helvetica', sans-serif"
    font-size="16"
    font-weight="400"
    fill="rgba(255,255,255,0.4)"
    text-anchor="middle"
    letter-spacing="3"
  >LEARN · BUILD · DEPLOY</text>

  <!-- Bottom accent line -->
  <rect x="185" y="435" width="130" height="2" rx="1" fill="url(#termGrad)" opacity="0.6"/>
</svg>
